<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="110" fill="#121214" stroke="#27272a" stroke-width="8"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#121214" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  
  <!-- Glowing central node system -->
  <g transform="translate(256, 230)">
    <!-- Connections -->
    <line x1="0" y1="0" x2="-80" y2="-60" stroke="#3b82f6" stroke-width="4" opacity="0.6" />
    <line x1="0" y1="0" x2="80" y2="-60" stroke="#3b82f6" stroke-width="4" opacity="0.6" />
    <line x1="0" y1="0" x2="-100" y2="40" stroke="#3b82f6" stroke-width="4" opacity="0.6" />
    <line x1="0" y1="0" x2="100" y2="40" stroke="#3b82f6" stroke-width="4" opacity="0.6" />
    <line x1="0" y1="0" x2="0" y2="100" stroke="#3b82f6" stroke-width="4" opacity="0.6" />
    
    <!-- Outer nodes -->
    <circle cx="-80" cy="-60" r="14" fill="#1d4ed8" stroke="#60a5fa" stroke-width="3" />
    <circle cx="80" cy="-60" r="14" fill="#1d4ed8" stroke="#60a5fa" stroke-width="3" />
    <circle cx="-100" cy="40" r="14" fill="#1d4ed8" stroke="#60a5fa" stroke-width="3" />
    <circle cx="100" cy="40" r="14" fill="#1d4ed8" stroke="#60a5fa" stroke-width="3" />
    <circle cx="0" cy="100" r="14" fill="#1d4ed8" stroke="#60a5fa" stroke-width="3" />
    
    <!-- Central powerful glowing node -->
    <circle cx="0" cy="0" r="24" fill="#2563eb" stroke="#ffffff" stroke-width="4" />
    <path d="M-8 0 L8 0 M0 -8 L0 8" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <text x="256" y="425" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="4" text-anchor="middle">AI NOTES</text>
  <text x="256" y="455" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#60a5fa" letter-spacing="6" text-anchor="middle">PROMPTFORGE</text>
</svg>
